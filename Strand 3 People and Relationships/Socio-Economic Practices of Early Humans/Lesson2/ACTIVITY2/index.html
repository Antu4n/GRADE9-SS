<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity 2: Tool Functions – What Did They Do?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="game-wrapper">
      <div id="game-container">
        <div id="start-screen" class="screen">
          <h1 id="start-title">Tool Functions – What Did They Do?</h1>
          <button class="start-button" onclick="showActivityIntro()">
            Start Activity
          </button>
        </div>

        <div id="game-screen" class="screen hidden">
          <div class="game-top-section">
            <h1 id="game-title">Tool Functions – What Did They Do?</h1>
            <div class="top-right-controls">
              <div id="progress-container">
                <div id="progress-bar"></div>
              </div>
              <span id="progress-text">0 / 7</span>
              <div class="instructions-icon" onclick="showInstructions()">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"
                  />
                </svg>
              </div>
            </div>
          </div>

          <div class="hint-icon" onclick="openHintModal()">
            <svg viewBox="0 0 24 24">
              <path
                d="M9 21c0 .5.4 1 1 1h4c.6 0 1-.5 1-1v-1H9v1zm3-19C8.1 2 5 5.1 5 9c0 2.4 1.2 4.5 3 5.7V17c0 .5.4 1 1 1h6c.6 0 1-.5 1-1v-2.3c1.8-1.3 3-3.4 3-5.7 0-3.9-3.1-7-7-7z"
              />
            </svg>
          </div>

          <div id="game-content-area">
            <div class="carousel-container">
              <button class="carousel-nav-btn" id="carousel-prev">
                <svg viewBox="0 0 24 24">
                  <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                </svg>
              </button>
              <div id="image-carousel-wrapper">
                <div id="image-carousel"></div>
              </div>
              <button class="carousel-nav-btn" id="carousel-next">
                <svg viewBox="0 0 24 24">
                  <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div id="completion-overlay" class="overlay hidden">
          <h2 class="completion-title-banner">Activity Conclusion</h2>
          <img
            id="completion-image"
            src="images/complete.jpg"
            alt="Key Takeaways Summary"
            onerror="
              this.src =
                'https://via.placeholder.com/600x400?text=Conclusion+Image'
            "
          />
          <div class="completion-buttons">
            <button class="completion-btn btn-previous" onclick="prevActivity()">
              Previous Activity
            </button>
            <button class="completion-btn btn-restart" onclick="restartGame()">
              Restart Activity
            </button>
            <button class="completion-btn btn-previous" onclick="nextActivity()">
              Next Activity
            </button>
          </div>
        </div>

        <div id="activity-intro-overlay" class="overlay hidden">
          <div class="modal">
            <h2>Activity Introduction</h2>
            <p id="intro-text"></p>
            <button onclick="closeModal('activity-intro-overlay')">
              Continue
            </button>
          </div>
        </div>

        <div id="instructions-overlay" class="overlay hidden">
          <div class="modal">
            <h2>Learner Instructions</h2>
            <p id="instructions-text"></p>
            <button onclick="closeModal('instructions-overlay')">
              Got it!
            </button>
          </div>
        </div>

        <div id="hint-overlay" class="overlay hidden">
          <div class="modal hint-modal">
            <h2>Here are some hints</h2>
            <div class="hint-content">
              <ul class="hints-list" id="hints-list-container">
              </ul>
            </div>
            <button
              class="hint-btn"
              onclick="closeModal('hint-overlay')"
            >
              Got it
            </button>
          </div>
        </div>

        <div id="image-details-overlay" class="overlay hidden">
          <div class="modal">
            <div id="details-content-new">
              <div id="details-image-panel">
                <div id="details-image-header">
                  <span class="details-eyebrow" id="details-eyebrow-text">Type</span>
                  <h2 id="details-image-title">Location View</h2>
                </div>
                <img id="details-image" src="" alt="Location View" />
              </div>
              <div id="details-questions">
                <h2 id="details-question-text">Scenario Description</h2>
                <div id="details-options-container"></div>
              </div>
            </div>
          </div>
        </div>

        <div id="feedback-correct-overlay" class="overlay hidden">
          <div class="modal feedback-modal">
            <div class="feedback-header correct">
              <h2>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                  <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span id="trait-title-display">Correct!</span>
              </h2>
            </div>
            <p id="correct-feedback-text"></p>
            <button
              class="feedback-btn correct"
              onclick="handleFeedbackContinue(this)"
            >
              Continue
            </button>
          </div>
        </div>

        <div id="feedback-incorrect-overlay" class="overlay hidden">
          <div class="modal feedback-modal">
            <div class="feedback-header incorrect">
              <h2>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="15" y1="9" x2="9" y2="15"></line>
              <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
                Try Again
              </h2>
            </div>
            <p id="incorrect-feedback-text">That is not correct.</p>
            <button
              class="feedback-btn incorrect"
              onclick="handleFeedbackTryAgain(this)"
            >
              Try Again
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const activityData = {
        title: "Tool Functions",
        introduction: "Tools were not just stones, they were survival superpowers! Each one had a special job. Let us click through this Stone Age Tool Gallery to discover what early humans used them for.",
        instructions: "Explore the Stone Age Tool Gallery by clicking on each tool icon or image.<br>2️⃣ When you click, the tool will flip or pop open to reveal its name, function, and animation.<br>3️⃣ Read the description, watch the animation, and listen to the narration to understand how the tool was used.<br>4️⃣ Think about the human need it met, was it for food, shelter, hunting, or something else?<br>5️⃣ Visit all tool hotspots to fill your progress meter to 100%.<br>6️⃣ Once you have explored them all, click Finish to move to the next challenge.",
        hints: [
          "Connect each tool to a human need like gathering food, building a shelter, or hunting.",
          "Look closely at the animations to understand how these tools functioned."
        ],
        images: [
          {
            id: "1",
            imageSrc: "images/hand_axe.jpg",
            scene: "Hand Axe",
            type: "🪓",
            explanation: "<strong>Function:</strong> Used for chopping wood, cutting meat, and even digging. A true all-rounder!<br><br><strong>Media Enhancement:</strong> Short animation of a hand axe chopping a tree limb or butchering meat."
          },
          {
            id: "2",
            imageSrc: "images/scraper.jpg",
            scene: "Scraper",
            type: "🔪",
            explanation: "<strong>Function:</strong> Used to remove meat from bones or clean animal hides to make clothing.<br><br><strong>Media Enhancement:</strong> Animation: Scraping hide stretched on a wooden frame."
          },
          {
            id: "3",
            imageSrc: "images/arrowhead.jpg",
            scene: "Arrowhead",
            type: "🏹",
            explanation: "<strong>Function:</strong> Sharp and deadly, it was attached to arrows for hunting animals.<br><br><strong>Media Enhancement:</strong> Animation: Arrow flying through air and striking prey."
          },
          {
            id: "4",
            imageSrc: "images/grinding_stone.jpg",
            scene: "Grinding Stone",
            type: "🌰",
            explanation: "<strong>Function:</strong> Used to crush seeds, nuts, and grains into flour or meal for cooking. Think of this as the Stone Age version of a blender!<br><br><strong>Media Enhancement:</strong> Animation of grinding motion with seed to flour transition."
          },
          {
            id: "5",
            imageSrc: "images/hammerstone.jpg",
            scene: "Hammerstone",
            type: "🔨",
            explanation: "<strong>Function:</strong> A multipurpose pounder, great for breaking nuts, shaping tools, or tenderizing meat.<br><br><strong>Media Enhancement:</strong> Animation: Smashing nuts and striking a stone core."
          },
          {
            id: "6",
            imageSrc: "images/digging_stick.jpg",
            scene: "Digging Stick",
            type: "🪴",
            explanation: "<strong>Function:</strong> Used for digging roots and tubers or loosening soil for planting.<br><br><strong>Media Enhancement:</strong> Animation: Person digging up sweet potatoes or loosening earth."
          },
          {
            id: "7",
            imageSrc: "images/microlith.jpg",
            scene: "Microlith",
            type: "✂️",
            explanation: "<strong>Function:</strong> Tiny blades inserted into wood or bone handles to make knives, arrows, or spears. Microlith = micro + lith (stone). These were small but powerful.<br><br><strong>Media Enhancement:</strong> Animation: Assembling microliths into a composite spear."
          }
        ]
      };

      let currentImageId = null;
      let completedImages = new Set();
      let totalImages = activityData.images.length;
      let introAudio, dingAudio, buzzAudio, outroAudio;
      let hasPlayedIntro = false;
      let initReadyResolve;
      const initReady = new Promise((resolve) => {
        initReadyResolve = resolve;
      });

      // ===== AUDIO HANDLING =====
      function initAudio() {
        try {
          introAudio = new Audio("audio/intro.mp3");
          dingAudio = new Audio("audio/ding.mp3");
          buzzAudio = new Audio("audio/buzz.mp3");
          outroAudio = new Audio("audio/outro.mp3");
        } catch (e) {
          console.warn("Audio could not be loaded.");
          const mockAudio = { play: () => {}, pause: () => {}, currentTime: 0 };
          introAudio = dingAudio = buzzAudio = outroAudio = mockAudio;
        }
      }
      function playSound(audio) {
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch((e) => {});
        }
      }
      function stopSound(audio) {
        if (audio) {
          audio.pause();
        }
      }

      // ===== CAROUSEL LOGIC =====
      function renderCarousel() {
        const carousel = document.getElementById("image-carousel");
        carousel.innerHTML = "";
        activityData.images.forEach((imgData) => {
          const wrapper = document.createElement("div");
          wrapper.className = "carousel-item-wrapper";
          wrapper.dataset.id = imgData.id;
          wrapper.onclick = () => showImageDetails(imgData.id);

          const img = document.createElement("img");
          img.onerror = function () {
            this.src = "https://via.placeholder.com/300?text=Tool+Image+Missing";
          };
          img.src = imgData.imageSrc;
          img.alt = imgData.scene;
          img.className = "carousel-image";

          const check = document.createElement("div");
          check.className = "completed-checkmark";
          check.innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;

          if (completedImages.has(imgData.id)) {
            wrapper.classList.add("completed");
          }

          wrapper.appendChild(img);
          wrapper.appendChild(check);
          carousel.appendChild(wrapper);
        });
        updateCarouselFocus();
      }

      function setupCarouselNav() {
        const carousel = document.getElementById("image-carousel");
        const prevBtn = document.getElementById("carousel-prev");
        const nextBtn = document.getElementById("carousel-next");

        const scrollCarousel = (direction) => {
          const focusedEl =
            carousel.querySelector(".in-focus") || carousel.firstElementChild;
          if (!focusedEl) return;

          if (direction === "next") {
            const targetEl = focusedEl.nextElementSibling;
            if (targetEl)
              targetEl.scrollIntoView({
                behavior: "smooth",
                inline: "center",
                block: "nearest",
              });
            else
              carousel.firstElementChild.scrollIntoView({
                behavior: "smooth",
                inline: "center",
                block: "nearest",
              });
          } else {
            const targetEl = focusedEl.previousElementSibling;
            if (targetEl)
              targetEl.scrollIntoView({
                behavior: "smooth",
                inline: "center",
                block: "nearest",
              });
            else
              carousel.lastElementChild.scrollIntoView({
                behavior: "smooth",
                inline: "center",
                block: "nearest",
              });
          }
        };

        prevBtn.addEventListener("click", () => scrollCarousel("prev"));
        nextBtn.addEventListener("click", () => scrollCarousel("next"));
        carousel.addEventListener("scroll", updateCarouselFocus);
      }

      let scrollTimeout;
      function updateCarouselFocus() {
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
          const carousel = document.getElementById("image-carousel");
          if (!carousel) return;
          const carouselRect = carousel.getBoundingClientRect();
          const carouselCenter = carouselRect.left + carouselRect.width / 2;

          let minDistance = Infinity;
          let focusedChild = null;

          [...carousel.children].forEach((child) => {
            const childRect = child.getBoundingClientRect();
            const childCenter = childRect.left + childRect.width / 2;
            const distance = Math.abs(carouselCenter - childCenter);

            child.classList.remove("in-focus");
            if (distance < minDistance) {
              minDistance = distance;
              focusedChild = child;
            }
          });

          if (focusedChild) focusedChild.classList.add("in-focus");
        }, 100);
      }

      // ===== GAME LOGIC / HOTSPOTS =====
      function showImageDetails(id) {
        if (completedImages.has(id)) return;
        currentImageId = id;

        const imgData = activityData.images.find((i) => i.id === id);

        const detailsImg = document.getElementById("details-image");
        detailsImg.onerror = function () {
          this.src = "https://via.placeholder.com/300?text=Tool+Image+Missing";
        };
        detailsImg.src = imgData.imageSrc;
        detailsImg.alt = imgData.scene;
        
        // Dynamically update the 'Type' and Title
        document.getElementById("details-eyebrow-text").textContent = "Tool";
        document.getElementById("details-image-title").textContent = imgData.scene;
        
        // Re-using the H2 element to display the explanation based on the original styling
        document.getElementById("details-question-text").innerHTML = imgData.explanation;
        document.getElementById("details-question-text").style.fontSize = "1.3rem"; 
        document.getElementById("details-question-text").style.lineHeight = "1.5";

        const optionsContainer = document.getElementById("details-options-container");
        optionsContainer.innerHTML = "";

        const continueBtn = document.createElement("button");
        continueBtn.className = "option-btn";
        continueBtn.textContent = "Got it";
        continueBtn.onclick = () => markJobRead(continueBtn);
        optionsContainer.appendChild(continueBtn);

        document.getElementById("image-details-overlay").classList.remove("hidden");
      }

      function markJobRead(button) {
        button.disabled = true;
        playSound(dingAudio);
        
        completedImages.add(currentImageId);
        updateProgress();
        renderCarousel();
        closeModal("image-details-overlay");

        const nextItemToScroll = findNextIncompleteItem();
        if (nextItemToScroll) {
          const carouselElement = document.querySelector(
            `#image-carousel .carousel-item-wrapper[data-id="${nextItemToScroll.id}"]`,
          );
          if (carouselElement) {
            setTimeout(() => {
              carouselElement.scrollIntoView({
                behavior: "smooth",
                inline: "center",
                block: "nearest",
              });
            }, 100);
          }
        } else {
          endActivity();
        }
      }

      function findNextIncompleteItem() {
        if (completedImages.size === totalImages) return null;
        const currentIndex = activityData.images.findIndex(
          (img) => img.id === currentImageId,
        );
        for (let i = 1; i < totalImages; i++) {
          const nextIndex = (currentIndex + i) % totalImages;
          const nextImgData = activityData.images[nextIndex];
          if (!completedImages.has(nextImgData.id)) return nextImgData;
        }
        return null;
      }

      function updateProgress() {
        const progress = completedImages.size;
        document.getElementById("progress-bar").style.width =
          `${(progress / totalImages) * 100}%`;
        document.getElementById("progress-text").textContent =
          `${progress} / ${totalImages}`;
      }

      // ===== FEEDBACK HANDLERS (Unused in this activity but retained for structure) =====
      function handleFeedbackContinue(button) { }
      function handleFeedbackTryAgain(button) { }

      // ===== MODAL AND SCREEN LOGIC =====
      function showActivityIntro() {
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");

        if (typeof sendEvent !== "undefined") {
          sendEvent(ActivityEvent.START_ACTIVITY, {
            activityName: activityData.title,
          });
        }

        initReady.then(() => {
          if (!hasPlayedIntro) {
            document
              .getElementById("activity-intro-overlay")
              .classList.remove("hidden");
            playSound(introAudio);
            hasPlayedIntro = true;
          } else {
            renderCarousel();
          }
        });
      }

      function showInstructions() {
        document.getElementById("instructions-overlay").classList.remove("hidden");
      }

      function openHintModal() {
        const el = document.getElementById("hint-overlay");
        if (el) el.classList.remove("hidden");
      }

      function closeModal(id) {
        document.getElementById(id).classList.add("hidden");

        if (id === "activity-intro-overlay") {
          stopSound(introAudio);
          renderCarousel();
          setTimeout(updateCarouselFocus, 150);
        }
      }

      function endActivity() {
        document.getElementById("progress-bar").style.width = `100%`;
        document.getElementById("progress-text").textContent =
          `${totalImages} / ${totalImages}`;
        document.getElementById("game-screen").classList.add("hidden");
        document.getElementById("completion-overlay").classList.remove("hidden");
        playSound(outroAudio);
      }

      function restartGame() {
        stopSound(outroAudio);
        document.getElementById("completion-overlay").classList.add("hidden");
        document.getElementById("activity-intro-overlay").classList.add("hidden");
        document.getElementById("image-details-overlay").classList.add("hidden");

        completedImages.clear();
        currentImageId = null;
        hasPlayedIntro = true;

        updateProgress();
        document.getElementById("game-screen").classList.remove("hidden");

        renderCarousel();
        document.getElementById("image-carousel").scrollLeft = 0;
        setTimeout(updateCarouselFocus, 150);
      }

      function prevActivity() {
        if (typeof sendEvent !== "undefined") {
          sendEvent(ActivityEvent.END_ACTIVITY, {
            currentActivity: activityData.title,
          });
        }
        window.location.href = "../ACTIVITY1/index.html";
      }

      function nextActivity() {
        if (typeof sendEvent !== "undefined") {
          sendEvent(ActivityEvent.END_ACTIVITY, {
            currentActivity: activityData.title,
          });
        }
        window.location.href = "../ACTIVITY3/index.html";
      } 

      function populateStaticContent() {
        document.getElementById("start-title").textContent = activityData.title;
        document.getElementById("game-title").textContent = activityData.title;
        document.getElementById("intro-text").innerHTML = activityData.introduction;
        document.getElementById("instructions-text").innerHTML = activityData.instructions;
        
        const hintsList = document.getElementById("hints-list-container");
        activityData.hints.forEach(hint => {
            const li = document.createElement("li");
            li.textContent = hint;
            hintsList.appendChild(li);
        });
        
        document.getElementById("progress-text").textContent = `0 / ${totalImages}`;
      }

      window.onload = () => {
        initAudio();
        populateStaticContent();
        setupCarouselNav();

        if (typeof initReadyResolve === "function") initReadyResolve();
      };
    </script>
    <script src="../eventSender.js"></script>
  </body>
</html>
