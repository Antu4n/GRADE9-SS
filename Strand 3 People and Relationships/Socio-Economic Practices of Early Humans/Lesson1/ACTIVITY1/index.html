<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity 1: The Three Ages of the Stone Age</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="game-wrapper">
      <div id="game-container">
        <div id="start-screen" class="screen">
          <h1 id="start-title">The Three Ages of the Stone Age</h1>
          <button class="start-button" onclick="showActivityIntro()">
            Start Activity
          </button>
        </div>

        <div id="game-screen" class="screen hidden">
          <div class="game-top-section">
            <h1 id="game-title">The Three Ages of the Stone Age</h1>
            <div class="top-right-controls">
              <div id="progress-container">
                <div id="progress-bar"></div>
              </div>
              <span id="progress-text">0 / 3</span>
              <div class="instructions-icon" onclick="showInstructions()">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"
                  />
                </svg>
              </div>
            </div>
          </div>

          <div class="hint-icon" onclick="openHintModal()">
            <svg viewBox="0 0 24 24">
              <path
                d="M9 21c0 .5.4 1 1 1h4c.6 0 1-.5 1-1v-1H9v1zm3-19C8.1 2 5 5.1 5 9c0 2.4 1.2 4.5 3 5.7V17c0 .5.4 1 1 1h6c.6 0 1-.5 1-1v-2.3c1.8-1.3 3-3.4 3-5.7 0-3.9-3.1-7-7-7z"
              />
            </svg>
          </div>

          <div id="game-content-area">
            <div id="timeline-container">
              <svg id="timeline-svg" width="100%" height="100%">
                <line id="timeline-bg-line" x1="5%" y1="50%" x2="88%" y2="50%" stroke="rgba(255,255,255,0.2)" stroke-width="12" stroke-linecap="round"/>
                <line id="timeline-progress-line" x1="5%" y1="50%" x2="5%" y2="50%" stroke="#fbb03b" stroke-width="12" stroke-linecap="round"/>
              </svg>
              <div id="timeline-nodes-wrapper"></div>
            </div>
          </div>
        </div>

        <div id="completion-overlay" class="overlay hidden">
          <h2 class="completion-title-banner">Activity Conclusion</h2>
          <img
            id="completion-image"
            src="images/complete.jpg"
            alt="Key Takeaways Summary"
            onerror="
              this.src =
                'https://via.placeholder.com/600x400?text=Conclusion+Image'
            "
          />
          <div class="completion-buttons">
            <button class="completion-btn btn-restart" onclick="restartGame()">
              Restart Activity
            </button>
            <button class="completion-btn btn-previous" onclick="nextActivity()">
              Next Activity
            </button>
          </div>
        </div>

        <div id="activity-intro-overlay" class="overlay hidden">
          <div class="modal">
            <h2>Activity Introduction</h2>
            <p id="intro-text"></p>
            <button onclick="closeModal('activity-intro-overlay')">
              Continue
            </button>
          </div>
        </div>

        <div id="instructions-overlay" class="overlay hidden">
          <div class="modal">
            <h2>Learner Instructions</h2>
            <div id="instructions-text" style="text-align: left; font-size: 1.2rem; line-height: 1.6;"></div>
            <button onclick="closeModal('instructions-overlay')">
              Got it!
            </button>
          </div>
        </div>

        <div id="hint-overlay" class="overlay hidden">
          <div class="modal hint-modal">
            <h2>Here is a hint</h2>
            <div class="hint-content">
              <ul class="hints-list" id="hints-list-container">
              </ul>
            </div>
            <button
              class="hint-btn"
              onclick="closeModal('hint-overlay')"
            >
              Got it
            </button>
          </div>
        </div>

        <div id="image-details-overlay" class="overlay hidden">
          <div class="modal">
            <div id="details-content-new">
              <div id="details-image-panel">
                <div id="details-image-header">
                  <span class="details-eyebrow" id="details-eyebrow-text">Era</span>
                  <h2 id="details-image-title">Location View</h2>
                </div>
                <img id="details-image" src="" alt="Location View" />
              </div>
              <div id="details-questions">
                <div id="details-question-text">Scenario Description</div>
                <div id="details-options-container"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/anime.min.js"></script>
    <script>
      const activityData = {
        title: "Ages of the Stone Age",
        introduction: "Ready to travel millions of years into the past? The Stone Age wasn't just one moment; it was a huge stretch of time with big changes! Let us hop on our time machine and explore the three stages of the Stone Age. Tap the glowing points on the timeline to discover what humans were up to in each era!",
        instructions: "1. Look at the animated Stone Age timeline on your screen.<br>2. Wait for the timeline to reach the next historical period.<br>3. Tap or click the glowing hotspot to travel to that era.<br>4. Read the narration and observe the pictures or animations.<br>5. Read the pop-up tips to help you remember key facts.<br>6. Visit all three ages (Early, Middle, Late) to complete your journey.",
        hints: [
          "Early humans used what was around them. This is called resourcefulness!",
          "Middle means in between. Think of it as the 'learning and improving' stage!"
        ],
        images: [
          {
            id: "1",
            imageSrc: "images/early-stone-age.jpg",
            scene: "Early Stone Age",
            type: "Lower Palaeolithic",
            explanation: "You have landed in the Early Stone Age, over 2 million years ago! Life was tough, and people were hunters and gatherers. They made very basic tools, like choppers, from stone, bones, and sticks. No fire, no farms, just survival and teamwork.",
            tip: "Notice how simple their tools were? Early humans used what was around them. This is called resourcefulness!",
            position: 15,
            themeColor: "#8D6E63" // Earth Brown
          },
          {
            id: "2",
            imageSrc: "images/middle-stone-age.jpg",
            scene: "Middle Stone Age",
            type: "Mesolithic",
            explanation: "Welcome to the Middle Stone Age! Things are heating up, literally. People now made fire, improved tools, and painted amazing cave art. They started using spoken language to work better as a team.",
            tip: "Middle means in between. Think of it as the 'learning and improving' stage!",
            position: 50,
            themeColor: "#E64A19" // Fire Orange
          },
          {
            id: "3",
            imageSrc: "images/late-stone-age.jpg",
            scene: "Late Stone Age",
            type: "Upper Palaeolithic",
            explanation: "Now you are in the Late Stone Age, where humans really levelled up! People began farming, taming animals, and building villages. They made microliths, tiny but sharp tools, and started forming organized communities. The first steps toward civilization!",
            tip: "Notice the new tools and settled areas! Farming and taming animals allowed early humans to build villages.",
            position: 85,
            themeColor: "#2E7D32" // Nature Green
          }
        ]
      };

      let currentImageId = null;
      let completedImages = new Set();
      let totalImages = activityData.images.length;
      let introAudio, dingAudio, buzzAudio, outroAudio;
      let hasPlayedIntro = false;
      let initReadyResolve;
      const initReady = new Promise((resolve) => {
        initReadyResolve = resolve;
      });

      // ===== AUDIO HANDLING =====
      function initAudio() {
        try {
          introAudio = new Audio("audio/intro.mp3");
          dingAudio = new Audio("audio/ding.mp3");
          buzzAudio = new Audio("audio/buzz.mp3");
          outroAudio = new Audio("audio/outro.mp3");
        } catch (e) {
          console.warn("Audio could not be loaded.");
          const mockAudio = { play: () => {}, pause: () => {}, currentTime: 0 };
          introAudio = dingAudio = buzzAudio = outroAudio = mockAudio;
        }
      }
      function playSound(audio) {
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch((e) => {});
        }
      }
      function stopSound(audio) {
        if (audio) {
          audio.pause();
        }
      }

      // ===== TIMELINE LOGIC =====
      function renderTimelineDOM() {
        const wrapper = document.getElementById("timeline-nodes-wrapper");
        wrapper.innerHTML = "";

        activityData.images.forEach((imgData) => {
          const wrapperDiv = document.createElement("div");
          wrapperDiv.className = "timeline-node-wrapper";
          wrapperDiv.id = `wrapper-${imgData.id}`;
          wrapperDiv.style.left = `${imgData.position}%`;
          
          // The visual diamond node
          const node = document.createElement("div");
          node.className = "timeline-node";
          node.id = `node-${imgData.id}`;
          node.style.backgroundColor = imgData.themeColor;
          
          // Inner content (icon/checkmark)
          const inner = document.createElement("div");
          inner.className = "timeline-node-inner";
          inner.id = `inner-${imgData.id}`;
          
          // Default icon (padlock or empty) replaced by checkmark upon completion
          inner.innerHTML = `<svg class="node-icon" viewBox="0 0 24 24" id="icon-${imgData.id}"><circle cx="12" cy="12" r="4"/></svg>`;
          
          node.appendChild(inner);
          wrapperDiv.appendChild(node);

          const label = document.createElement("div");
          label.className = "timeline-label";
          label.id = `label-${imgData.id}`;
          label.textContent = imgData.scene;

          wrapperDiv.appendChild(label);
          wrapper.appendChild(wrapperDiv);

          // Click handler for the wrapper
          wrapperDiv.onclick = () => openNode(imgData);
        });
      }

      function startTimelineSequence() {
        // Reset line
        document.getElementById("timeline-progress-line").setAttribute("x2", "5%");
        revealNextNode();
      }

      function revealNextNode() {
        if (completedImages.size === totalImages) {
          setTimeout(endActivity, 600);
          return;
        }

        const targetData = activityData.images[completedImages.size];
        const line = document.getElementById("timeline-progress-line");
        const nodeElem = document.getElementById(`node-${targetData.id}`);
        const wrapperElem = document.getElementById(`wrapper-${targetData.id}`);
        const labelElem = document.getElementById(`label-${targetData.id}`);

        // Animate the line drawing to the node's position
        anime({
          targets: line,
          x2: `${targetData.position}%`,
          duration: 1200,
          easing: 'easeInOutQuad',
          complete: function() {
            // Once line arrives, pop the node in
            anime({
              targets: nodeElem,
              scale: [0, 1],
              opacity: [0, 1],
              rotate: [45, 45], // maintain diamond shape
              duration: 800,
              easing: 'easeOutElastic(1, .5)'
            });
            
            anime({
              targets: labelElem,
              opacity: [0, 1],
              translateY: [-10, 0],
              duration: 600,
              easing: 'easeOutQuad',
              delay: 200
            });

            wrapperElem.classList.add("clickable", "glowing");
          }
        });
      }

      function openNode(imgData) {
        const wrapperElem = document.getElementById(`wrapper-${imgData.id}`);
        if (!wrapperElem.classList.contains("clickable") || completedImages.has(imgData.id)) {
          return; // Node is either not reached yet or already completed
        }

        currentImageId = imgData.id;

        const detailsImg = document.getElementById("details-image");
        detailsImg.onerror = function () {
          this.src = "https://via.placeholder.com/300?text=Image+Missing";
        };
        detailsImg.src = imgData.imageSrc;
        detailsImg.alt = imgData.scene;
        
        document.getElementById("details-eyebrow-text").textContent = imgData.type;
        document.getElementById("details-image-title").textContent = imgData.scene;
        
        const questionContainer = document.getElementById("details-question-text");
        questionContainer.innerHTML = `
          <div style="font-size: 1.2rem; line-height: 1.5; margin-bottom: 1rem;">${imgData.explanation}</div>
          <div class="tip-container">
            <strong>Pop-up Tip:</strong> ${imgData.tip}
          </div>
        `;

        const optionsContainer = document.getElementById("details-options-container");
        optionsContainer.innerHTML = "";

        const continueBtn = document.createElement("button");
        continueBtn.className = "option-btn";
        continueBtn.textContent = "Got it";
        continueBtn.onclick = () => markJobRead(continueBtn, imgData);
        optionsContainer.appendChild(continueBtn);

        document.getElementById("image-details-overlay").classList.remove("hidden");
      }

      function markJobRead(button, imgData) {
        button.disabled = true;
        playSound(dingAudio);
        
        completedImages.add(currentImageId);
        updateProgress();
        closeModal("image-details-overlay");

        // Update Node visually to completed state
        const wrapperElem = document.getElementById(`wrapper-${imgData.id}`);
        const innerElem = document.getElementById(`inner-${imgData.id}`);
        
        wrapperElem.classList.remove("glowing", "clickable");
        wrapperElem.classList.add("completed");
        
        // Swap icon to checkmark
        innerElem.innerHTML = `<svg class="completed-icon" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;
        
        // Trigger next node appearance
        revealNextNode();
      }

      function updateProgress() {
        const progress = completedImages.size;
        document.getElementById("progress-bar").style.width =
          `${(progress / totalImages) * 100}%`;
        document.getElementById("progress-text").textContent =
          `${progress} / ${totalImages}`;
      }

      // ===== MODAL AND SCREEN LOGIC =====
      function showActivityIntro() {
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");

        if (typeof sendEvent !== "undefined") {
          sendEvent(ActivityEvent.START_ACTIVITY, {
            activityName: activityData.title,
          });
        }

        initReady.then(() => {
          renderTimelineDOM();
          if (!hasPlayedIntro) {
            document
              .getElementById("activity-intro-overlay")
              .classList.remove("hidden");
            playSound(introAudio);
            hasPlayedIntro = true;
          } else {
            startTimelineSequence();
          }
        });
      }

      function showInstructions() {
        document.getElementById("instructions-overlay").classList.remove("hidden");
      }

      function openHintModal() {
        const el = document.getElementById("hint-overlay");
        if (el) el.classList.remove("hidden");
      }

      function closeModal(id) {
        document.getElementById(id).classList.add("hidden");

        if (id === "activity-intro-overlay") {
          stopSound(introAudio);
          startTimelineSequence();
        }
      }

      function endActivity() {
        document.getElementById("progress-bar").style.width = `100%`;
        document.getElementById("progress-text").textContent =
          `${totalImages} / ${totalImages}`;
        document.getElementById("game-screen").classList.add("hidden");
        document.getElementById("completion-overlay").classList.remove("hidden");
        playSound(outroAudio);
      }

      function restartGame() {
        stopSound(outroAudio);
        document.getElementById("completion-overlay").classList.add("hidden");
        document.getElementById("activity-intro-overlay").classList.add("hidden");
        document.getElementById("image-details-overlay").classList.add("hidden");

        completedImages.clear();
        currentImageId = null;
        hasPlayedIntro = true;
        
        updateProgress();
        document.getElementById("game-screen").classList.remove("hidden");
        
        renderTimelineDOM();
        startTimelineSequence();
      }

      function nextActivity() {
        if (typeof sendEvent !== "undefined") {
          sendEvent(ActivityEvent.END_ACTIVITY, {
            currentActivity: activityData.title,
          });
        }
        window.location.href = "../ACTIVITY2/index.html";
      } 

      function populateStaticContent() {
        document.getElementById("start-title").textContent = activityData.title;
        document.getElementById("game-title").textContent = activityData.title;
        document.getElementById("intro-text").innerHTML = activityData.introduction;
        document.getElementById("instructions-text").innerHTML = activityData.instructions;
        
        const hintsList = document.getElementById("hints-list-container");
        activityData.hints.forEach(hint => {
            const li = document.createElement("li");
            li.textContent = hint;
            hintsList.appendChild(li);
        });
        
        document.getElementById("progress-text").textContent = `0 / ${totalImages}`;
      }

      window.onload = () => {
        initAudio();
        populateStaticContent();
        if (typeof initReadyResolve === "function") initReadyResolve();
      };
    </script>
    <script src="../eventSender.js"></script>
  </body>
</html>
