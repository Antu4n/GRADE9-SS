<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity 1: Knowledge Tree Explorer – Branches of Indigenous Wisdom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="game-wrapper">
      <div id="game-container">
        <div id="start-screen" class="screen">
          <h1 id="start-title">Knowledge Tree Explorer</h1>
          <button class="start-button" onclick="showActivityIntro()">
            Start Activity
          </button>
        </div>

        <div id="game-screen" class="screen hidden">
          <div class="game-top-section">
            <h1 id="game-title">Knowledge Tree Explorer</h1>
            <div class="top-right-controls">
              <div id="progress-container">
                <div id="progress-bar"></div>
              </div>
              <span id="progress-text">0 / 4</span>
              <div class="instructions-icon" onclick="showInstructions()">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"
                  />
                </svg>
              </div>
            </div>
          </div>

          <div class="hint-icon" onclick="openHintModal()">
            <svg viewBox="0 0 24 24">
              <path
                d="M9 21c0 .5.4 1 1 1h4c.6 0 1-.5 1-1v-1H9v1zm3-19C8.1 2 5 5.1 5 9c0 2.4 1.2 4.5 3 5.7V17c0 .5.4 1 1 1h6c.6 0 1-.5 1-1v-2.3c1.8-1.3 3-3.4 3-5.7 0-3.9-3.1-7-7-7z"
              />
            </svg>
          </div>

          <div id="game-content-area">
            <div class="bg-grid-overlay"></div>
            
            <div id="tree-container">
              <svg id="tree-svg" width="100%" height="100%">
                </svg>
              
              <div id="central-node" class="pulsing-start" onclick="expandTree()">
                <svg class="progress-ring" viewBox="0 0 100 100">
                  <circle class="ring-bg" cx="50" cy="50" r="46" />
                  <circle id="ring-progress" class="ring-fill" cx="50" cy="50" r="46" />
                </svg>
                <div class="central-text">Tree of<br>Indigenous<br>Knowledge</div>
              </div>

              <div id="leaf-nodes-wrapper"></div>
            </div>
          </div>
        </div>

        <div id="completion-overlay" class="overlay hidden">
          <h2 class="completion-title-banner">Activity Conclusion</h2>
          <img
            id="completion-image"
            src="images/complete.jpg"
            alt="Key Takeaways Summary"
            onerror="
              this.src =
                'https://via.placeholder.com/600x400?text=Conclusion+Image'
            "
          />
          <div class="completion-buttons">
            <button class="completion-btn btn-restart" onclick="restartGame()">
              Restart Activity
            </button>
            <button class="completion-btn btn-previous" onclick="nextActivity()">
              Next Activity
            </button>
          </div>
        </div>

        <div id="activity-intro-overlay" class="overlay hidden">
          <div class="modal">
            <h2>Activity Introduction</h2>
            <p id="intro-text"></p>
            <button onclick="closeModal('activity-intro-overlay')">
              Continue
            </button>
          </div>
        </div>

        <div id="instructions-overlay" class="overlay hidden">
          <div class="modal">
            <h2>Learner Instructions</h2>
            <div id="instructions-text" style="text-align: left; font-size: 1.2rem; line-height: 1.6;"></div>
            <button onclick="closeModal('instructions-overlay')">
              Got it!
            </button>
          </div>
        </div>

        <div id="hint-overlay" class="overlay hidden">
          <div class="modal hint-modal">
            <h2>Here is a hint</h2>
            <div class="hint-content">
              <ul class="hints-list" id="hints-list-container">
              </ul>
            </div>
            <button
              class="hint-btn"
              onclick="closeModal('hint-overlay')"
            >
              Got it
            </button>
          </div>
        </div>

        <div id="image-details-overlay" class="overlay hidden">
          <div class="modal">
            <div id="details-content-new">
              <div id="details-image-panel">
                <div id="details-image-header">
                  <span class="details-eyebrow" id="details-eyebrow-text">Era</span>
                  <h2 id="details-image-title">Location View</h2>
                </div>
                <img id="details-image" src="" alt="Location View" />
              </div>
              <div id="details-questions">
                <div id="details-question-text">Scenario Description</div>
                <div id="details-options-container"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/anime.min.js"></script>
    <script>
      const icons = {
        food: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>`,
        health: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>`,
        environment: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>`,
        conflict: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M5 10v6a3 3 0 0 0 6 0v-6"/><path d="M19 10v6a3 3 0 0 1-6 0v-6"/><path d="M2 10h20"/></svg>`
      };

      const activityData = {
        title: "Knowledge Tree Explorer",
        introduction: "Welcome, young knowledge seeker! Before you stands the mighty Tree of Indigenous Knowledge, a living symbol of wisdom passed down through generations in African communities. Each branch tells a story about how people fed their families, healed the sick, protected the environment, and maintained peace. Tap on each branch to uncover the secrets of this powerful tree.",
        instructions: "Look at the Tree of Indigenous Knowledge. Each branch represents a different area of life: Food, Health, Environment, and Conflict Resolution.<br>Click on any branch to explore how Indigenous Knowledge supported that area.<br>In each branch, read the description, look at the visual, and listen to the narration.<br>Check the “Did You Know?” fact to discover something surprising or new.<br>Explore all four branches to complete the tree and unlock your Knowledge Explorer badge.",
        hints: [
          "Think about how nature provided for daily needs.",
          "Consider how communities worked together to stay united."
        ],
        images: [
          {
            id: "1",
            imageSrc: "images/food.jpg",
            scene: "Food",
            iconSvg: icons.food,
            type: "Farming & Nutrition",
            explanation: "Indigenous farming techniques helped communities grow healthy food while caring for the soil. Farmers used methods like crop rotation and mixed farming to increase yields and avoid pests, all without chemicals.",
            tip: "Some farmers still plant maize with legumes to save space and protect the soil!",
            left: "20%",
            top: "60%", 
            themeColor: "#2E7D32" 
          },
          {
            id: "2",
            imageSrc: "images/health.jpg",
            scene: "Health",
            iconSvg: icons.health,
            type: "Traditional Medicine",
            explanation: "Traditional healers used plants and natural remedies to treat common illnesses like colds, wounds, and stomach upsets. Medicinal plants like neem, aloe vera, and garlic were used for healing. This knowledge was passed down through generations.",
            tip: "Some rural clinics still use traditional herbs alongside modern medicine!",
            left: "40%",
            top: "75%", 
            themeColor: "#1565C0" 
          },
          {
            id: "3",
            imageSrc: "images/environment.jpg",
            scene: "Environment",
            iconSvg: icons.environment,
            type: "Nature Protection",
            explanation: "Communities protected nature by setting rules and sacred boundaries around important places. Forests, rivers, and trees were preserved through taboos, sacred groves, and community respect for nature.",
            tip: "In some places, it is forbidden to cut down certain trees because they are considered sacred!",
            left: "60%",
            top: "75%", 
            themeColor: "#E64A19" 
          },
          {
            id: "4",
            imageSrc: "images/conflict.jpg",
            scene: "Conflict Resolution",
            iconSvg: icons.conflict,
            type: "Peace & Justice",
            explanation: "Disagreements were solved peacefully through dialogue led by respected elders. Community disputes were settled using elders’ councils and traditional laws, ensuring fairness and unity.",
            tip: "Some villages still settle land or family disputes using community elders, not courts!",
            left: "80%",
            top: "60%", 
            themeColor: "#6A1B9A" 
          }
        ]
      };

      let currentImageId = null;
      let completedImages = new Set();
      let totalImages = activityData.images.length;
      let introAudio, dingAudio, buzzAudio, outroAudio;
      let hasPlayedIntro = false;
      let treeExpanded = false;
      let currentRevealIndex = 0; // Tracks which node to reveal next

      let initReadyResolve;
      const initReady = new Promise((resolve) => {
        initReadyResolve = resolve;
      });

      function initAudio() {
        try {
          introAudio = new Audio("audio/intro.mp3");
          dingAudio = new Audio("audio/ding.mp3");
          buzzAudio = new Audio("audio/buzz.mp3");
          outroAudio = new Audio("audio/outro.mp3");
        } catch (e) {
          console.warn("Audio could not be loaded.");
          const mockAudio = { play: () => {}, pause: () => {}, currentTime: 0 };
          introAudio = dingAudio = buzzAudio = outroAudio = mockAudio;
        }
      }
      function playSound(audio) {
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch((e) => {});
        }
      }
      function stopSound(audio) {
        if (audio) {
          audio.pause();
        }
      }

      function renderTreeDOM() {
        const treeSvg = document.getElementById("tree-svg");
        const wrapper = document.getElementById("leaf-nodes-wrapper");
        wrapper.innerHTML = "";
        treeSvg.innerHTML = "";

        activityData.images.forEach((imgData) => {
          // Connecting line
          const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
          line.setAttribute("x1", "50%");
          line.setAttribute("y1", "25%");
          line.setAttribute("x2", imgData.left);
          line.setAttribute("y2", imgData.top);
          line.setAttribute("class", "branch-line");
          line.setAttribute("id", `line-${imgData.id}`);
          
          // Set to continuous color-coded lines
          line.style.strokeDasharray = "1000"; 
          line.style.strokeDashoffset = "1000";
          line.style.stroke = imgData.themeColor; 
          
          treeSvg.appendChild(line);

          // Leaf node
          const wrapperDiv = document.createElement("div");
          wrapperDiv.className = "leaf-wrapper";
          wrapperDiv.id = `wrapper-${imgData.id}`;
          wrapperDiv.style.left = imgData.left;
          wrapperDiv.style.top = imgData.top;
          
          const node = document.createElement("div");
          node.className = "leaf-node";
          node.id = `node-${imgData.id}`;
          node.style.borderColor = imgData.themeColor;
          node.style.color = imgData.themeColor;
          
          const inner = document.createElement("div");
          inner.className = "leaf-inner";
          inner.id = `inner-${imgData.id}`;
          inner.innerHTML = imgData.iconSvg;
          
          node.appendChild(inner);
          wrapperDiv.appendChild(node);

          const label = document.createElement("div");
          label.className = "leaf-label";
          label.id = `label-${imgData.id}`;
          label.textContent = imgData.scene;

          wrapperDiv.appendChild(label);
          wrapper.appendChild(wrapperDiv);

          wrapperDiv.onclick = () => openNode(imgData);
        });
      }

      function revealNode(index) {
        if (index >= activityData.images.length) return;
        
        const imgData = activityData.images[index];
        const lineElem = document.getElementById(`line-${imgData.id}`);
        const nodeElem = document.getElementById(`node-${imgData.id}`);
        const labelElem = document.getElementById(`label-${imgData.id}`);
        const wrapperElem = document.getElementById(`wrapper-${imgData.id}`);

        anime({
          targets: lineElem,
          strokeDashoffset: [1000, 0],
          easing: "easeInOutSine",
          duration: 800,
          complete: function() {
            anime({
              targets: nodeElem,
              scale: [0, 1],
              opacity: [0, 1],
              duration: 600,
              easing: "easeOutBack"
            });
            
            anime({
              targets: labelElem,
              opacity: [0, 1],
              translateY: [-10, 0],
              duration: 400,
              delay: 200,
              easing: "easeOutQuad"
            });

            setTimeout(() => {
              wrapperElem.classList.add("clickable");
              wrapperElem.style.animation = `node-bobbing 3s infinite ease-in-out`;
            }, 400);
          }
        });
      }

      function expandTree() {
        if (treeExpanded) return;
        treeExpanded = true;
        
        const centralNode = document.getElementById("central-node");
        centralNode.classList.remove("pulsing-start");
        centralNode.classList.add("expanded");
        centralNode.style.cursor = "default";
        playSound(dingAudio);

        // Sequentially reveal only the first node
        revealNode(currentRevealIndex);
      }

      function openNode(imgData) {
        const wrapperElem = document.getElementById(`wrapper-${imgData.id}`);
        if (!wrapperElem.classList.contains("clickable") || completedImages.has(imgData.id)) {
          return;
        }

        currentImageId = imgData.id;

        const detailsImg = document.getElementById("details-image");
        detailsImg.onerror = function () {
          this.src = "https://via.placeholder.com/300?text=Image+Missing";
        };
        detailsImg.src = imgData.imageSrc;
        detailsImg.alt = imgData.scene;
        
        document.getElementById("details-eyebrow-text").textContent = imgData.type;
        document.getElementById("details-image-title").textContent = imgData.scene;
        
        const questionContainer = document.getElementById("details-question-text");
        questionContainer.innerHTML = `
          <div style="font-size: 1.2rem; line-height: 1.3;">${imgData.explanation}</div>
          <div class="tip-container">
            <strong>Did You Know?</strong> ${imgData.tip}
          </div>
        `;

        const optionsContainer = document.getElementById("details-options-container");
        optionsContainer.innerHTML = "";

        const continueBtn = document.createElement("button");
        continueBtn.className = "option-btn";
        continueBtn.textContent = "Continue";
        continueBtn.onclick = () => markJobRead(continueBtn, imgData);
        optionsContainer.appendChild(continueBtn);

        document.getElementById("image-details-overlay").classList.remove("hidden");
      }

      function markJobRead(button, imgData) {
        button.disabled = true;
        playSound(dingAudio);
        
        completedImages.add(currentImageId);
        updateProgress();
        closeModal("image-details-overlay");

        const wrapperElem = document.getElementById(`wrapper-${imgData.id}`);
        const innerElem = document.getElementById(`inner-${imgData.id}`);
        
        wrapperElem.classList.remove("clickable");
        wrapperElem.style.animation = "none";
        wrapperElem.classList.add("completed");
        
        innerElem.innerHTML = `<svg class="completed-icon" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;

        // Sequentially reveal the next node
        currentRevealIndex++;
        if (currentRevealIndex < totalImages) {
          setTimeout(() => revealNode(currentRevealIndex), 300);
        }
      }

      function updateProgress() {
        const progress = completedImages.size;
        
        document.getElementById("progress-bar").style.width = `${(progress / totalImages) * 100}%`;
        document.getElementById("progress-text").textContent = `${progress} / ${totalImages}`;

        const ring = document.getElementById("ring-progress");
        const circ = 289.02;
        const offset = circ - (progress / totalImages) * circ;
        ring.style.strokeDashoffset = offset;

        if (progress === totalImages) {
          setTimeout(endActivity, 800);
        }
      }

      function showActivityIntro() {
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");

        if (typeof sendEvent !== "undefined") {
          sendEvent(ActivityEvent.START_ACTIVITY, {
            activityName: activityData.title,
          });
        }

        initReady.then(() => {
          renderTreeDOM();
          if (!hasPlayedIntro) {
            document
              .getElementById("activity-intro-overlay")
              .classList.remove("hidden");
            playSound(introAudio);
            hasPlayedIntro = true;
          }
        });
      }

      function showInstructions() {
        document.getElementById("instructions-overlay").classList.remove("hidden");
      }

      function openHintModal() {
        const el = document.getElementById("hint-overlay");
        if (el) el.classList.remove("hidden");
      }

      function closeModal(id) {
        document.getElementById(id).classList.add("hidden");
        if (id === "activity-intro-overlay") {
          stopSound(introAudio);
        }
      }

      function endActivity() {
        document.getElementById("game-screen").classList.add("hidden");
        document.getElementById("completion-overlay").classList.remove("hidden");
        playSound(outroAudio);
      }

      function restartGame() {
        stopSound(outroAudio);
        document.getElementById("completion-overlay").classList.add("hidden");
        document.getElementById("activity-intro-overlay").classList.add("hidden");
        document.getElementById("image-details-overlay").classList.add("hidden");

        completedImages.clear();
        currentImageId = null;
        treeExpanded = false;
        currentRevealIndex = 0;
        hasPlayedIntro = true;
        
        const ring = document.getElementById("ring-progress");
        ring.style.strokeDashoffset = 289.02;
        
        const centralNode = document.getElementById("central-node");
        centralNode.classList.remove("expanded");
        centralNode.classList.add("pulsing-start");
        centralNode.style.cursor = "pointer";

        updateProgress();
        document.getElementById("game-screen").classList.remove("hidden");
        
        renderTreeDOM();
      }

      function nextActivity() {
        if (typeof sendEvent !== "undefined") {
          sendEvent(ActivityEvent.END_ACTIVITY, {
            currentActivity: activityData.title,
          });
        }
        window.location.href = "../ACTIVITY2/index.html";
      } 

      function populateStaticContent() {
        document.getElementById("start-title").textContent = activityData.title;
        document.getElementById("game-title").textContent = activityData.title;
        document.getElementById("intro-text").innerHTML = activityData.introduction;
        document.getElementById("instructions-text").innerHTML = activityData.instructions;
        
        const hintsList = document.getElementById("hints-list-container");
        hintsList.innerHTML = "";
        activityData.hints.forEach(hint => {
            const li = document.createElement("li");
            li.textContent = hint;
            hintsList.appendChild(li);
        });
        
        document.getElementById("progress-text").textContent = `0 / ${totalImages}`;
      }

      window.onload = () => {
        initAudio();
        populateStaticContent();
        if (typeof initReadyResolve === "function") initReadyResolve();
      };
    </script>
    <script src="../eventSender.js"></script>
  </body>
</html>
